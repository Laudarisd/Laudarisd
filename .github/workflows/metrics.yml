name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: metrics
  cancel-in-progress: true

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1) 3D calendar only (clean, no extra text)
      - name: Generate 3D calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          user: Laudarisd
          filename: metrics-3d.svg

          # IMPORTANT: hide the big text blocks
          base: ""

          config_timezone: Asia/Seoul

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      # 2) Optional: compact main metrics (keep if you want)
      - name: Generate main metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          user: Laudarisd
          filename: metrics-main.svg

          template: classic
          base: header, activity, community, repositories
          config_timezone: Asia/Seoul

          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_details: bytes-size, percentage

          plugin_lines: yes
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
